name: Build, Stage, Approve, Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v5
      with:
        name: python-package-distributions
        path: dist/
        
  publish-to-testpypi:
    name: Publish PyCentral to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pycentral/

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
  
  publish-to-pypi:
    name: Publish PyCentral to PyPI
    needs: publish-to-testpypi        # only run after TestPyPI succeeds
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # only run on tags

    environment:
      name: pypi
      url: https://pypi.org/project/pycentral/

    permissions:
      id-token: write       # required for trusted publishing
      contents: read

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
  
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
